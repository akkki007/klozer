<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; }
  .row { display:flex; align-items:center; gap: 12px; padding: 3px 0; }
  .label { width: 40px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .bar { background: var(--fg); height: 10px; border-radius: 2px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="row"><span class="label">1</span><span class="bar" style="width:4px"></span><span class="px">4</span></div>
  <div class="row"><span class="label">2</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
  <div class="row"><span class="label">3</span><span class="bar" style="width:12px"></span><span class="px">12</span></div>
  <div class="row"><span class="label">4</span><span class="bar" style="width:16px"></span><span class="px">16</span></div>
  <div class="row"><span class="label">5</span><span class="bar" style="width:20px"></span><span class="px">20</span></div>
  <div class="row"><span class="label">6</span><span class="bar" style="width:24px"></span><span class="px">24</span></div>
  <div class="row"><span class="label">7</span><span class="bar" style="width:32px"></span><span class="px">32</span></div>
  <div class="row"><span class="label">8</span><span class="bar" style="width:40px"></span><span class="px">40</span></div>
  <div class="row"><span class="label">9</span><span class="bar" style="width:56px"></span><span class="px">56</span></div>
  <div class="row"><span class="label">10</span><span class="bar" style="width:80px"></span><span class="px">80</span></div>
  <div class="row"><span class="label">11</span><span class="bar" style="width:120px"></span><span class="px">120</span></div>
  <div class="row"><span class="label">12</span><span class="bar" style="width:160px"></span><span class="px">160</span></div>
</body></html>
