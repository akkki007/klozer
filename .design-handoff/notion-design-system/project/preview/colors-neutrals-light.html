<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Neutrals (Light)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .swatch { padding: 10px; border-radius: 6px; border: 1px solid var(--border); display:flex; flex-direction:column; gap:4px; }
  .name { font-size: 12px; font-weight: 600; color: var(--fg); }
  .hex  { font-size: 11px; font-family: var(--font-mono); color: var(--fg-muted); }
  .chip { width: 100%; height: 36px; border-radius: 4px; border: 1px solid var(--border); }
</style></head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#FFFDFA"></div><span class="name">Canvas</span><span class="hex">#FFFDFA</span></div>
    <div class="swatch"><div class="chip" style="background:#F9F5F1"></div><span class="name">Soft panel</span><span class="hex">#F9F5F1</span></div>
    <div class="swatch"><div class="chip" style="background:#FFFFFF"></div><span class="name">Elevated</span><span class="hex">#FFFFFF</span></div>
    <div class="swatch"><div class="chip" style="background:#37352F"></div><span class="name">Body fg</span><span class="hex">#37352F</span></div>
    <div class="swatch"><div class="chip" style="background:#040404"></div><span class="name">Display fg</span><span class="hex">#040404</span></div>
    <div class="swatch"><div class="chip" style="background:rgba(55,53,47,0.65)"></div><span class="name">Muted</span><span class="hex">55,53,47/.65</span></div>
    <div class="swatch"><div class="chip" style="background:rgba(55,53,47,0.16)"></div><span class="name">Border</span><span class="hex">55,53,47/.16</span></div>
    <div class="swatch"><div class="chip" style="background:#EEEEED"></div><span class="name">Hairline</span><span class="hex">#EEEEED</span></div>
  </div>
</body></html>
