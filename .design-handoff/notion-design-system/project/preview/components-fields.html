<!doctype html>
<html><head><meta charset="utf-8"><title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; display:flex; flex-direction:column; gap:14px; }
  .field { display:flex; flex-direction:column; gap:6px; max-width: 360px; }
  .lbl { font-size: 12px; color: var(--fg-muted); }
  .err { font-size: 12px; color: var(--accent-text); }
</style></head>
<body>
  <div class="field">
    <span class="lbl">Work email</span>
    <input class="input" placeholder="Enter your email address...">
  </div>
  <div class="field">
    <span class="lbl">Focused</span>
    <input class="input" value="ada@lovelace.app" autofocus>
  </div>
  <div class="field">
    <span class="lbl">Error</span>
    <input class="input" value="not-an-email" style="background:var(--bg-tinted-red);box-shadow: inset 0 0 0 1px var(--accent-soft), var(--shadow-1)">
    <span class="err">Please enter a valid email address.</span>
  </div>
</body></html>
