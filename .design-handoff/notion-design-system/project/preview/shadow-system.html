<!doctype html>
<html><head><meta charset="utf-8"><title>Shadow system</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg); }
  .grid { display:flex; gap: 28px; align-items: flex-end; }
  .item { display:flex; flex-direction:column; gap:10px; align-items:center; }
  .box { width: 120px; height: 80px; background: var(--bg-elevated); border-radius: 6px; }
  .name { font-size: 11px; font-family: var(--font-mono); color: var(--fg-muted); text-align:center; }
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="box-shadow: var(--shadow-1)"></div><span class="name">shadow-1<br>input/btn</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-2)"></div><span class="name">shadow-2<br>popover</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-3)"></div><span class="name">shadow-3<br>hero (6-layer)</span></div>
  </div>
</body></html>
