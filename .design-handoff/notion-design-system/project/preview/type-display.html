<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; }
  .label { font-size: 11px; color: var(--fg-muted); width: 110px; flex: 0 0 110px; font-family: var(--font-mono); line-height: 1.3; }
  .specimen { color: var(--fg-display); font-family: var(--font-display); font-weight: 500; }
  .face { font-size: 11px; font-family: var(--font-mono); color: var(--fg-faint); margin-bottom: 6px; }
</style></head>
<body>
  <div class="face">Display face — Helvetica Now Display Medium · brand upload</div>
  <div class="row"><span class="label">50 / 500<br>tracking -0.02</span><span class="specimen" style="font-size:50px;line-height:55px;letter-spacing:-0.02em;">Sign up</span></div>
  <div class="row"><span class="label">36 / 500</span><span class="specimen" style="font-size:36px;line-height:1.1;letter-spacing:-0.015em;">Tasks. Projects.</span></div>
  <div class="row"><span class="label">24 / 500</span><span class="specimen" style="font-size:24px;line-height:1.25;letter-spacing:-0.01em;">Powerful building blocks</span></div>
</body></html>
