<!doctype html>
<html><head><meta charset="utf-8"><title>Callout block</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; display:flex; flex-direction:column; gap: 10px; }
  .callout { display:flex; gap: 10px; padding: 14px 16px; border-radius: 4px; font-size: 14px; line-height: 1.5; align-items: flex-start; }
  .ico { font-size: 18px; line-height: 1.2; }
</style></head>
<body>
  <div class="callout" style="background:#FBF3DB;color:#37352F"><span class="ico">💡</span>Tip — press <code style="background:rgba(0,0,0,0.05);padding:1px 4px;border-radius:3px;font-family:var(--font-mono);font-size:13px;color:#37352F">/</code> to open the block menu inside any page.</div>
  <div class="callout" style="background:#FBE4E4;color:#37352F"><span class="ico">⚠️</span>Heads up — this database has 12,000 entries. Filter before browsing.</div>
  <div class="callout" style="background:#DDEBF1;color:#37352F"><span class="ico">📘</span>Notes — sub-pages inherit permissions from their parent unless overridden.</div>
  <div class="callout" style="background:#DDEDEA;color:#37352F"><span class="ico">✅</span>Connected — Notion will now sync issues from this Linear project.</div>
</body></html>
