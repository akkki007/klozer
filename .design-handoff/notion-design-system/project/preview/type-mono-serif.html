<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Mono &amp; Serif</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { padding: 6px 0; }
  .label { font-size: 11px; color: var(--fg-muted); font-family: var(--font-mono); display:block; margin-bottom:4px; }
</style></head>
<body>
  <div class="row">
    <span class="label">Mono · iawriter-mono / Menlo</span>
    <code style="font-size:14px;background:var(--bg-soft);padding:2px 8px;border-radius:3px;color:var(--accent-text);">await page.create({ icon: "📄" })</code>
  </div>
  <div class="row">
    <span class="label">Serif · Lyon-Text / Georgia (alt page style)</span>
    <span style="font-family:var(--font-serif);font-size:24px;color:var(--fg-display);">A different kind of page.</span>
  </div>
  <div class="row">
    <span class="label">Inline — sentence with link</span>
    <span style="font-size:15px;">Visit your <a href="#">workspace settings</a> to invite teammates.</span>
  </div>
</body></html>
