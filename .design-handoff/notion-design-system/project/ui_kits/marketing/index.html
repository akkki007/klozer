<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Notion — Marketing UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin: 0; }
  #root { min-height: 100vh; }
  /* Tab bar at the top of the kit */
  .kit-tabs { position: sticky; top: 0; z-index: 20; display:flex; gap:6px; padding:10px 16px; background: rgba(255,253,250,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border-hairline); }
  .kit-tabs button { font-size: 13px; padding: 6px 12px; border-radius: 4px; border: 1px solid transparent; background: transparent; cursor:pointer; color: var(--fg); font-family: var(--font-sans); }
  .kit-tabs button.active { background: var(--bg-active); }
  .kit-tabs button:hover { background: var(--bg-hover); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [page, setPage] = useState('home');
  const tabs = [
    {id:'home', label:'Home'},
    {id:'pricing', label:'Pricing'},
    {id:'signup', label:'Sign up'},
    {id:'ai', label:'AI (dark)'},
  ];
  const isDark = page === 'ai';
  return (
    <div className={isDark ? 'theme-dark' : 'theme-light'} data-screen-label={`Marketing — ${page}`}>
      <div className="kit-tabs" style={isDark ? {background:'rgba(0,0,0,0.6)', borderBottomColor:'rgba(255,255,255,0.08)'} : {}}>
        {tabs.map(t => (
          <button key={t.id} className={page===t.id ? 'active' : ''} onClick={()=>setPage(t.id)}>{t.label}</button>
        ))}
      </div>
      {page !== 'ai' && <TopNav onSignUp={() => setPage('signup')} onLogin={() => setPage('signup')} />}
      {page === 'home' && <HomePage goSignUp={() => setPage('signup')} />}
      {page === 'pricing' && <PricingPage />}
      {page === 'signup' && <SignUpPage onSubmit={() => setPage('home')} />}
      {page === 'ai' && <AIPage />}
      {page !== 'ai' && <Footer />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
